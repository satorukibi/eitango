<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Vocabulary drill logo">
  <defs>
    <linearGradient id="surface" x1="16" y1="10" x2="80" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4f9cff"/>
      <stop offset=".48" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#173da8"/>
    </linearGradient>
    <linearGradient id="page" x1="25" y1="30" x2="72" y2="71" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff"/>
      <stop offset="1" stop-color="#c7dcff"/>
    </linearGradient>
    <linearGradient id="page-shadow" x1="18" y1="23" x2="75" y2="75" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a9c7ff" stop-opacity=".7"/>
      <stop offset="1" stop-color="#315ba8" stop-opacity=".55"/>
    </linearGradient>
    <filter id="outer-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .05 0 0 0 0 .35 0 0 0 0 1 0 0 0 .95 0" result="blue-glow"/>
      <feMerge>
        <feMergeNode in="blue-glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="book-shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#071737" flood-opacity=".7"/>
    </filter>
  </defs>
  <g filter="url(#outer-glow)">
    <rect x="10" y="10" width="76" height="76" rx="22" fill="url(#surface)" stroke="#7db7ff" stroke-width="1.6"/>
    <path d="M17 28c18-5.4 26.8-1.2 31 4.4 4.2-5.6 13-9.8 31-4.4v38c-15-4.8-25-1.6-31 5.4-6-7-16-10.2-31-5.4z" fill="url(#page-shadow)" opacity=".75"/>
    <g filter="url(#book-shadow)" fill="url(#page)" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 28c12.6-3.9 22.2-.8 28 6.2v36.1c-6.2-7.1-15.7-10.1-28-6.2z" stroke-width="2.2"/>
      <path d="M48 34.2c5.8-7 15.4-10.1 28-6.2v36.1c-12.3-3.9-21.8-.9-28 6.2z" stroke-width="2.2"/>
      <path d="M48 34.2v36.1" stroke="#a8c9ff" stroke-width="1.5"/>
    </g>
    <path d="m31 48.3 9.1 9.1 24.2-24.2" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="7" filter="url(#book-shadow)"/>
  </g>
